<div class="container">
  <h1>My Grades</h1>

  <div *ngIf="isLoading" class="center-spinner">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
  </div>

  <div *ngIf="!isLoading">
    <mat-card class="info-card" *ngIf="studentData.grade">
      <mat-card-content>
        <h3>Grade: {{ studentData.grade?.name }}</h3>
        <div *ngIf="studentData.subjects && studentData.subjects.length > 0">
          <strong>Enrolled Subjects:</strong>
          <div style="display: flex; flex-wrap: wrap; gap: 4px;">
            <mat-chip *ngFor="let subject of studentData.subjects">{{ subject.name }}</mat-chip>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-tab-group *ngIf="subjectMarks.length > 0" class="mt-20">
      <mat-tab *ngFor="let subjectMark of subjectMarks" [label]="subjectMark.subject.name">
        <div class="tab-content">
          <h3>Average: {{ subjectMark.average }}%</h3>
          <table mat-table [dataSource]="subjectMark.marks" class="mat-elevation-z8">
            <ng-container matColumnDef="examType">
              <th mat-header-cell *matHeaderCellDef>Exam Type</th>
              <td mat-cell *matCellDef="let mark">{{ mark.examType }}</td>
            </ng-container>

            <ng-container matColumnDef="marks">
              <th mat-header-cell *matHeaderCellDef>Marks</th>
              <td mat-cell *matCellDef="let mark">{{ mark.marks }}</td>
            </ng-container>

            <ng-container matColumnDef="teacher">
              <th mat-header-cell *matHeaderCellDef>Teacher</th>
              <td mat-cell *matCellDef="let mark">{{ mark.teacher?.name }}</td>
            </ng-container>

            <ng-container matColumnDef="remarks">
              <th mat-header-cell *matHeaderCellDef>Remarks</th>
              <td mat-cell *matCellDef="let mark">{{ mark.remarks || 'N/A' }}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['examType', 'marks', 'teacher', 'remarks']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['examType', 'marks', 'teacher', 'remarks'];"></tr>
          </table>
        </div>
      </mat-tab>
    </mat-tab-group>

    <div *ngIf="subjectMarks.length === 0 && !isLoading" class="empty-state">
      <mat-icon>grade</mat-icon>
      <p>No grades available yet.</p>
    </div>
  </div>
</div>
