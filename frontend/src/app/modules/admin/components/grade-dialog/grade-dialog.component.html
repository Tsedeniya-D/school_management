<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Add' : 'Edit' }} Grade</h2>
<mat-dialog-content>
  <form [formGroup]="gradeForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" required>
      <mat-error *ngIf="gradeForm.get('name')?.hasError('required')">Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="isLoading || !gradeForm.valid">
    {{ data.mode === 'create' ? 'Create' : 'Update' }}
  </button>
</mat-dialog-actions>
