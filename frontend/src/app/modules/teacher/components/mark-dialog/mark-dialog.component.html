<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Assign' : 'Edit' }} Marks</h2>
<mat-dialog-content>
  <form [formGroup]="markForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Student</mat-label>
      <mat-select formControlName="student" [disabled]="!!data.student" required>
        <mat-option *ngFor="let student of students" [value]="student._id">{{ student.name }}</mat-option>
      </mat-select>
      <mat-error *ngIf="markForm.get('student')?.hasError('required')">Student is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Subject</mat-label>
      <mat-select formControlName="subject" required>
        <mat-option *ngFor="let subject of subjects" [value]="subject._id">{{ subject.name }}</mat-option>
      </mat-select>
      <mat-error *ngIf="markForm.get('subject')?.hasError('required')">Subject is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Marks</mat-label>
      <input matInput type="number" formControlName="marks" min="0" max="100" required>
      <mat-error *ngIf="markForm.get('marks')?.hasError('required')">Marks is required</mat-error>
      <mat-error *ngIf="markForm.get('marks')?.hasError('min') || markForm.get('marks')?.hasError('max')">Marks must be between 0 and 100</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Exam Type</mat-label>
      <mat-select formControlName="examType" required>
        <mat-option value="Quiz">Quiz</mat-option>
        <mat-option value="Midterm">Midterm</mat-option>
        <mat-option value="Final">Final</mat-option>
        <mat-option value="Assignment">Assignment</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Remarks</mat-label>
      <textarea matInput formControlName="remarks" rows="2"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="isLoading || !markForm.valid">
    {{ data.mode === 'create' ? 'Assign' : 'Update' }}
  </button>
</mat-dialog-actions>
