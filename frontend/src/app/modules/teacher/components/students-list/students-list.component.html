<div class="container">
  <h1>My Students</h1>
  
  <div *ngIf="isLoading" class="center-spinner">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="!isLoading && students.length === 0" class="empty-state">
    <mat-icon>people_outline</mat-icon>
    <p>No students assigned to you yet.</p>
  </div>

  <div class="students-grid" *ngIf="!isLoading && students.length > 0">
    <mat-card *ngFor="let student of students" class="student-card">
      <mat-card-header>
        <mat-card-title>{{ student.name }}</mat-card-title>
        <mat-card-subtitle>{{ student.email }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p><strong>Grade:</strong> {{ student.grade?.name || 'Not assigned' }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary" (click)="openMarkDialog(student)">
          <mat-icon>edit</mat-icon>
          Assign Marks
        </button>
        <button mat-button (click)="viewStudentDetails(student)">
          <mat-icon>visibility</mat-icon>
          View Details
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
